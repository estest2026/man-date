<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0B0B0F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Man-Date" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Man-Date | Plan Something Better</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      body { margin: 0; padding: 0; background: #0B0B0F; font-family: 'DM Sans', sans-serif; }
      input[type="date"], select { color-scheme: dark; }
      @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
      @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
      @keyframes logoReveal {
        0% { opacity: 0; filter: blur(8px); transform: scale(0.9); }
        30% { opacity: 1; filter: blur(0px); transform: scale(1.02); text-shadow: 0 0 30px rgba(218,165,32,0.8), 0 0 60px rgba(218,165,32,0.4); }
        60% { text-shadow: 0 0 15px rgba(218,165,32,0.4), 0 0 30px rgba(218,165,32,0.15); }
        100% { opacity: 1; filter: blur(0px); transform: scale(1); text-shadow: none; }
      }
      .logo-wrap {
        background: linear-gradient(135deg, #DAA520, #F0C850);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: logoReveal 1.8s ease-out forwards;
        opacity: 0;
      }
      .su { animation: slideUp 0.4s ease forwards; }
      .d1{animation-delay:0.05s;opacity:0}
      .d2{animation-delay:0.1s;opacity:0}
      .d3{animation-delay:0.15s;opacity:0}
      .d4{animation-delay:0.2s;opacity:0}
      .d5{animation-delay:0.25s;opacity:0}
      .d6{animation-delay:0.3s;opacity:0}
      .d7{animation-delay:0.35s;opacity:0}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
